<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockPro Studio - Master Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script src="image-data.js"></script>

    <style>
        /* BASE UI */
        body { background: #E8E8ED; color: #1D1D1F; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }
        .layout { display: grid; grid-template-columns: 320px 1fr; height: 100%; }
        
        .sidebar { 
            background: #FFFFFF; border-right: 1px solid #D2D2D7; 
            padding: 24px; display: flex; flex-direction: column; gap: 15px; 
            box-shadow: 2px 0 10px rgba(0,0,0,0.02); z-index: 50;
            height: 100%; overflow-y: auto; position: relative;
        }

        .main { 
            background: #E8E8ED; overflow-y: auto; overflow-x: hidden;
            display: flex; flex-direction: column; align-items: center; position: relative;
        }

        /* GLASSMORPHISM STICKY FILTER HEADER */
        #filterWrapper {
            position: sticky; top: 0; z-index: 40; width: 100%;
            background: rgba(232, 232, 237, 0.75);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 12px 24px; border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        /* PRO PILL BUTTONS */
        .pro-pill {
            display: inline-flex; align-items: center; justify-content: center; gap: 4px;
            padding: 5px 12px; border-radius: 99px; font-size: 10px; font-weight: 600;
            background: rgba(255, 255, 255, 0.8); border: 1px solid rgba(0,0,0,0.06);
            color: #86868B; cursor: pointer; user-select: none; letter-spacing: 0.3px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            transition: all 0.2s ease;
        }
        .pro-pill:hover { background: #FFFFFF; color: #1D1D1F; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .pro-pill.active {
            background: #1D1D1F; color: #FFFFFF; border-color: #1D1D1F;
            box-shadow: 0 4px 12px rgba(29, 29, 31, 0.2);
        }

        .pill-icon { width: 0; height: 10px; opacity: 0; overflow: hidden; transition: all 0.2s ease; }
        .pro-pill.active .pill-icon { width: 10px; opacity: 1; }

        /* --- SMART INLINE BODY FILTERS --- */
        .inline-filter-row { display: flex; align-items: flex-start; gap: 6px; width: 100%; }
        
        .adv-toggle-btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 4px; 
            background: rgba(0,0,0,0.03); padding: 5px 12px; border-radius: 99px; 
            font-size: 9.5px; font-weight: 700; color: #86868B; border: 1px solid transparent; 
            cursor: pointer; transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); white-space: nowrap;
            height: 24px; flex-shrink: 0;
        }
        .adv-toggle-btn:hover { background: rgba(0,0,0,0.06); color: #1D1D1F; }
        
        .adv-text { max-width: 100px; opacity: 1; overflow: hidden; transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); display: inline-block; }
        .adv-chevron { transform: rotate(0deg); transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); }
        
        .body-pills-container {
            display: flex; flex-wrap: wrap; gap: 6px; 
            max-width: 0; max-height: 24px; opacity: 0; overflow: hidden; pointer-events: none;
            transition: max-width 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.2s ease;
        }

        .advanced-open .adv-text { max-width: 0; opacity: 0; margin-left: -4px; padding: 0; }
        .advanced-open .adv-chevron { transform: rotate(180deg); }
        .advanced-open .adv-toggle-btn { padding: 5px 8px; background: rgba(0,0,0,0.06); color: #1D1D1F; }
        .advanced-open .body-pills-container { 
            max-width: 1200px; max-height: 1000px; 
            opacity: 1; pointer-events: auto; overflow: visible; 
            transition: max-width 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.3s ease 0.1s; 
        }

        /* SMOOTH & MINIMAL CARD ANIMATIONS */
        .card-wrapper {
            display: grid; grid-template-rows: 1fr;
            transition: grid-template-rows 0.35s ease-out, opacity 0.3s ease-out, margin 0.35s ease-out;
            margin-bottom: 30px; opacity: 1; width: 100%; max-width: 650px;
        }
        .card-wrapper > div.inner-card-container { overflow: hidden; min-height: 0; }
        .card-wrapper.hidden-item { grid-template-rows: 0fr; margin-bottom: 0; opacity: 0; pointer-events: none; }

        /* PREVIEW CARDS & ASSETS */
        .page-preview { 
            background: #FDFBF7; width: 100%; box-shadow: 0 4px 20px rgba(0,0,0,0.08); 
            border-radius: 6px; position: relative; overflow: hidden; 
        }
        
        .drop-zone { border: 1px dashed #86868B; border-radius: 8px; padding: 20px; text-align: center; cursor: pointer; transition: all 0.2s ease; background: #FAFAFC; }
        .drop-zone:hover { border-color: #0071E3; background: #F0F8FF; }
        .drop-zone.active { border-color: #0071E3; border-style: solid; background: #E8F2FF; }
        h1 { font-family: 'Playfair Display', serif; letter-spacing: -0.5px; }

        .btn-primary { background: #1D1D1F; color: #FFF; border: none; padding: 14px; border-radius: 8px; font-size: 13px; font-weight: 500; width: 100%; cursor: pointer; transition: 0.2s; }
        .btn-primary:hover { background: #333; transform: scale(1.01); }
        .btn-primary:disabled { background: #D2D2D7; color: #86868B; cursor: not-allowed; transform: none; }

        .filename-input { width: 100%; padding: 12px; border: 1px solid #D2D2D7; border-radius: 6px; font-size: 12px; font-weight: 600; color: #1D1D1F; outline: none; transition: all 0.2s; text-transform: uppercase; background: #FAFAFC; }
        .filename-input:focus { border-color: #0071E3; background: #FFF; }
        .filename-input::placeholder { color: #86868B; font-weight: 400; }
        .filename-input.error { border-color: #FF3B30; background: #FFF2F2; animation: shake 0.4s ease-in-out; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }

        .preview-img-container { width: 100%; background: #F0F0F0; position: relative; border-radius: 4px; display: flex; justify-content: center; overflow: hidden; border: 2px solid transparent; transition: border-color 0.2s; }
        .preview-img-container.drag-active { border-color: #0071E3; background: #E1F0FF; }
        .preview-img-container:hover .overlay { opacity: 1; }
        .preview-img { width: 100%; height: auto; display: block; }
        .overlay { position: absolute; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.2s; pointer-events: none; }
        .overlay button { pointer-events: auto; } 

        .warning-badge { background: #FF3B30; color: white; font-size: 10px; padding: 2px 8px; border-radius: 10px; position: absolute; top: 2px; right: 2px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); z-index: 5; }

        /* TOGGLES & BUTTONS */
        .toggle-container { display: flex; justify-content: space-between; align-items: center; background: #F5F5F7; padding: 8px 12px; border-radius: 6px; font-size: 11px; font-weight: 600; color: #424245; cursor: pointer; user-select: none; border: 1px solid #D2D2D7; }
        .toggle-switch { width: 30px; height: 16px; background: #D2D2D7; border-radius: 10px; position: relative; transition: 0.2s; }
        .toggle-switch.on { background: #1D1D1F; }
        .toggle-knob { width: 12px; height: 12px; background: white; border-radius: 50%; position: absolute; top: 2px; left: 2px; transition: 0.2s; }
        .toggle-switch.on .toggle-knob { left: 16px; }

        .grade-btn { flex: 1; padding: 8px 0; background: #FAFAFC; border: 1px solid #D2D2D7; border-radius: 6px; font-size: 10px; font-weight: bold; color: #86868B; cursor: pointer; transition: all 0.2s; }
        .grade-btn:hover { background: #E8E8ED; }
        .grade-btn.active { background: #BE963C; color: #FFF; border-color: #BE963C; }
        
        .sidebar::-webkit-scrollbar { width: 4px; }
        .sidebar::-webkit-scrollbar-thumb { background: #D2D2D7; border-radius: 2px; }
        .main::-webkit-scrollbar { width: 6px; }
        .main::-webkit-scrollbar-thumb { background: #C1C1C4; border-radius: 10px; border: 2px solid #E8E8ED; }

        .editable-text { border-radius: 4px; padding: 2px 4px; margin: -2px -4px; transition: all 0.2s; outline: none; display: inline-block; min-width: 20px; }
        .editable-text:hover { background: rgba(0,0,0,0.04); box-shadow: 0 0 0 2px rgba(0,0,0,0.04); cursor: text; }
        .editable-text:focus { background: #FFFFFF; box-shadow: 0 0 0 2px rgba(0,113,227,0.3); color: #0071E3 !important; }

        .page-preview.group:hover .delete-btn { opacity: 1; transform: scale(1); }
        .delete-btn { opacity: 0; transform: scale(0.9); transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1); }
    </style>
</head>
<body>

    <div class="layout">
        <div class="sidebar">
            <div class="flex items-center gap-2 mb-2">
               <img id="mainLogo" src="" alt="Granicer Logo" class="h-7 w-auto object-contain">
                
                <h1 class="text-stone-400 text-xl font-normal mt-1">Studio Max</h1>
            </div>
            
            <div class="drop-zone relative group flex flex-col items-center justify-center py-5 cursor-pointer transition-all duration-300" id="folderZone" onclick="handleFolderSelection()">
                <svg id="folderIcon" class="mb-2 text-[#86868B] transition-colors duration-300" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path><line x1="12" y1="11" x2="12" y2="17"></line><line x1="9" y1="14" x2="15" y2="14"></line>
                </svg>
                <span class="text-[10px] font-bold text-[#86868B] tracking-wide transition-colors duration-300" id="folderText">1. SELECT IMAGE FOLDER</span>

                <button id="clearFolderBtn" onclick="clearSavedFolder(event)" class="absolute top-2 right-2 hidden text-gray-400 hover:text-[#FF3B30] bg-white border border-gray-100 shadow-sm rounded-md p-1.5 opacity-0 group-hover:opacity-100 transition-all z-10" title="Remove Saved Folder">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                </button>
            </div>

            <div class="drop-zone" id="excelZone" onclick="document.getElementById('excelInput').click()">
                <span class="text-[11px] font-semibold text-gray-600 tracking-wide" id="excelText">2. SELECT EXCEL DATA</span>
                <input type="file" id="excelInput" accept=".xlsx, .xls, .csv" class="hidden">
            </div>

            <div class="flex flex-col gap-2 border-t border-b border-gray-200 py-3 my-1">
                <div class="toggle-container" onclick="toggleMissingFilter()">
                    <span>SHOW MISSING ONLY <span id="missingCountText" class="text-[#FF3B30] font-bold ml-0.5"></span></span>
                    <div class="toggle-switch" id="missingToggleUi"><div class="toggle-knob"></div></div>
                </div>

                <div class="flex bg-[#F5F5F7] p-1 rounded-md border border-[#D2D2D7] mt-1">
                    <button id="btn-basic-mode" onclick="setMode(false)" class="flex-1 text-[10px] font-bold py-1.5 rounded text-[#86868B] hover:text-[#1D1D1F] transition-all">BASIC</button>
                    <button id="btn-adv-mode" onclick="setMode(true)" class="flex-1 text-[10px] font-bold py-1.5 rounded bg-white shadow-sm text-[#1D1D1F] transition-all">ADVANCE</button>
                </div>

                <div id="gradeSelector" class="mt-2">
                    <label class="text-[9px] font-bold text-gray-400 block mb-1">SELECT GRADE QUANTITY</label>
                    <div class="flex gap-1">
                        <button class="grade-btn active" id="btn-PRE" onclick="setGrade('PRE')">PRE</button>
                        <button class="grade-btn" id="btn-STD" onclick="setGrade('STD')">STD</button>
                        <button class="grade-btn" id="btn-GOLD" onclick="setGrade('GOLD')">GOLD</button>
                        <button class="grade-btn" id="btn-ECO" onclick="setGrade('ECO')">ECO</button>
                    </div>
                </div>
            </div>

            <div class="flex justify-between items-center text-[11px] text-gray-500">
                <div>PAGES GENERATED: <b id="foundItems" class="text-black ml-1">0</b></div>
                <button id="undoBtn" onclick="undoLastDelete()" class="text-[#0071E3] font-bold opacity-0 pointer-events-none transition-opacity duration-200">UNDO DELETE</button>
            </div>

            <div class="mt-auto flex flex-col gap-3">
                <div>
                    <label class="text-[10px] font-bold text-gray-400 block mb-1">CATALOG FILENAME</label>
                    <input type="text" id="pdfNameInput" placeholder="ENTER CLIENT NAME" class="filename-input" oninput="this.value = this.value.toUpperCase()">
                </div>
                <div>
                    <button id="generateBtn" onclick="createPDF()" disabled class="btn-primary">Export PDF Catalog</button>
                    <p id="statusMsg" class="text-center text-[10px] text-gray-400 mt-2">Waiting for files...</p>
                </div>
            </div>
        </div>

        <div class="main">
            <div id="filterWrapper" class="hidden flex-col gap-2 w-full relative">
                
                <button id="resetFiltersBtn" onclick="resetAllFilters()" class="absolute right-[24px] top-[14px] text-[9px] font-bold bg-[#FFF2F2] text-[#FF3B30] border border-[#FF3B30]/20 hover:bg-[#FF3B30] hover:text-white px-3 py-1.5 rounded-full flex items-center gap-1.5 transition-all duration-300 opacity-0 pointer-events-none shadow-sm z-50 tracking-wider">
                    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg> 
                    CLEAR ALL
                </button>

                <div id="sizeFilters" class="flex flex-wrap gap-1.5 justify-start w-full pr-[100px]"></div>
                <div id="finishFilters" class="flex flex-wrap gap-1.5 justify-start w-full pr-[100px]"></div>

                <div id="advancedFiltersRow" class="inline-filter-row w-full pr-[100px]" style="display: none;">
                    <button class="adv-toggle-btn" onclick="toggleAdvancedFilters()" title="Toggle Body Filters">
                        <span class="adv-text">BODY FILTERS</span>
                        <svg class="adv-chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                    </button>
                    <div id="bodyFilters" class="body-pills-container"></div>
                </div>
            </div>

            <div id="mainContainer" style="width: 100%; display: flex; flex-direction: column; align-items: center; padding-top: 20px; padding-bottom: 50px;">
                <div class="text-center text-gray-400 text-sm mt-40">
                    Upload Excel & Images to begin.
                </div>
            </div>
        </div>
    </div>

    <input type="file" id="manualImgInput" accept="image/*" class="hidden">

    <script>
        // --- GLOBAL STATE ---
        let imageStore = []; 
        let masterRules = {};
        let rawSheetData = []; 
        let finalData = [];
        let persistentState = {}; 
        let activeEditIndex = -1;
        let isMissingFilterOn = false;
        let deletedStack = []; 
        
        let isAdvanceMode = true; 
        let activeGrade = 'PRE';   

        // PRO FILTER STATES
        let selectedSizes = new Set();
        let selectedFinishes = new Set();
        let selectedBodies = new Set();
        let isAdvancedFiltersOpen = false;

        const excelInput = document.getElementById('excelInput');
        const manualImgInput = document.getElementById('manualImgInput');
        const generateBtn = document.getElementById('generateBtn');
        const statusMsg = document.getElementById('statusMsg');
        const mainContainer = document.getElementById('mainContainer');
        const pdfNameInput = document.getElementById('pdfNameInput');
        const filterWrapper = document.getElementById('filterWrapper');

        window.addEventListener('beforeunload', function (e) {
            if (finalData.length > 0) { e.preventDefault(); e.returnValue = ''; }
        });

        // --- FOLDER MEMORY (INDEXEDDB SETUP) ---
        const DB_NAME = 'StockProDB';
        const STORE_NAME = 'folderStore';

        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, 1);
                request.onupgradeneeded = (e) => { e.target.result.createObjectStore(STORE_NAME); };
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        async function loadAllRules() {
    const ruleFiles = [
        'rules_800x2400x15.json',
        'rules_800x3000x15.json',
        'rules_800x3200x12.json',
        'rules_1000x3000x5.json',
        'rules_1200x1200x9.json',
            'rules_1200x1800x9.json',
            'rules_1200x2400x9.json',
            'rules_1200x2800x6.json',
            'rules_1200x3200x12.json',
            'rules_1200x3200x15.json',
            'rules_1600x1600x9.json',
            'rules_1600x3200x6.json',
           'rules_1600x3200x12.json',
            'rules_1600x3200x20.json',
        // Baaki 12 files ke naam bhi yahan add karein
    ];

    for (let fileName of ruleFiles) {
        try {
            const response = await fetch(`rules/${fileName}`);
            const data = await response.json();
            
            data.forEach(rule => {
                // Key ko lowercase mein store karna taaki matching asaan ho
                masterRules[rule.key.toLowerCase()] = rule.expectedImage;
            });
        } catch (e) {
            console.error("Error loading rule file:", fileName);
        }
    }
    console.log("Master Rules Loaded");
}



        async function saveFolderHandle(handle) {
            const db = await initDB();
            const tx = db.transaction(STORE_NAME, 'readwrite');
            tx.objectStore(STORE_NAME).put(handle, 'savedImageFolder');
            return tx.complete;
        }

        async function getSavedFolderHandle() {
            const db = await initDB();
            return new Promise((resolve) => {
                const tx = db.transaction(STORE_NAME, 'readonly');
                const request = tx.objectStore(STORE_NAME).get('savedImageFolder');
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => resolve(null);
            });
        }

        // --- UI STATE CONTROLLER FOR FOLDER ---
        function updateFolderUI(state, count = 0) {
            const zone = document.getElementById('folderZone');
            const icon = document.getElementById('folderIcon');
            const text = document.getElementById('folderText');
            const clearBtn = document.getElementById('clearFolderBtn');

            zone.className = 'drop-zone relative group flex flex-col items-center justify-center py-5 transition-all duration-300';
            clearBtn.classList.add('hidden');
            icon.classList.remove('animate-spin');

            if (state === 'DEFAULT') {
                icon.innerHTML = `<path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path><line x1="12" y1="11" x2="12" y2="17"></line><line x1="9" y1="14" x2="15" y2="14"></line>`;
                text.innerText = "1. SELECT IMAGE FOLDER";
                icon.style.color = text.style.color = '#86868B';
                zone.style.borderColor = ""; zone.style.background = "";
            } else if (state === 'SAVED_READY') {
                icon.innerHTML = `<path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path><polygon points="10 11 16 14 10 17 10 11" fill="currentColor"></polygon>`;
                text.innerText = "LOAD SAVED FOLDER";
                icon.style.color = text.style.color = '#0071E3'; 
                zone.style.borderColor = "#0071E3"; zone.style.background = "#F0F8FF";
                clearBtn.classList.remove('hidden');
            } else if (state === 'LOADING') {
                icon.innerHTML = `<line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line>`;
                text.innerText = "SCANNING FOLDERS...";
                icon.classList.add('animate-spin');
                icon.style.color = text.style.color = '#86868B';
                zone.style.borderColor = "#D2D2D7"; zone.style.background = "#F5F5F7";
                zone.classList.add('pointer-events-none'); 
            } else if (state === 'DONE') {
                icon.innerHTML = `<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline>`;
                text.innerText = `IMAGES LOADED (${count})`;
                icon.style.color = '#34C759'; text.style.color = '#1D1D1F'; 
                zone.style.borderColor = "#34C759"; zone.style.background = "#F0FFF4";
                clearBtn.classList.remove('hidden');
            }
        }

        async function clearSavedFolder(e) {
            e.stopPropagation(); 
            const db = await initDB();
            const tx = db.transaction(STORE_NAME, 'readwrite');
            tx.objectStore(STORE_NAME).delete('savedImageFolder');
            imageStore = [];
            updateFolderUI('DEFAULT');
        }

        // --- 1. INDEXING IMAGES (FILE SYSTEM API) ---
        async function verifyPermission(fileHandle, readWrite) {
            const options = {};
            if (readWrite) { options.mode = 'readwrite'; }
            if ((await fileHandle.queryPermission(options)) === 'granted') { return true; }
            if ((await fileHandle.requestPermission(options)) === 'granted') { return true; }
            return false;
        }

        async function readDirectoryRecursively(dirHandle, path = '') {
            let files = [];
            for await (const entry of dirHandle.values()) {
                if (entry.kind === 'file' && entry.name.match(/\.(jpg|jpeg|png|webp)$/i)) {
                    const file = await entry.getFile();
                    let folderName = path ? path.replace(/\/$/, "") : "root";
                    files.push({
                        name: file.name, cleanName: file.name.toLowerCase().replace(/[^a-z0-9]/g, ''),
                        folder: folderName, cleanFolder: folderName.toLowerCase().replace(/[^a-z0-9]/g, ''), file: file
                    });
                } else if (entry.kind === 'directory') {
                    files.push(...await readDirectoryRecursively(entry, entry.name + '/'));
                }
            }
            return files;
        }

        let isFolderLoading = false; 
        
        async function handleFolderSelection() {
            if (isFolderLoading) return; 
            
            try {
                let dirHandle = await getSavedFolderHandle();
                if (!dirHandle) {
                    dirHandle = await window.showDirectoryPicker();
                    await saveFolderHandle(dirHandle);
                }

                isFolderLoading = true;
                if (await verifyPermission(dirHandle, false)) {
                    updateFolderUI('LOADING');
                    statusMsg.innerText = "Indexing Images...";

                    imageStore = await readDirectoryRecursively(dirHandle);
                    
                    updateFolderUI('DONE', imageStore.length);
                    if(rawSheetData.length > 0) runMatcher();
                    statusMsg.innerText = "Images Ready";
                } else {
                    alert("Permission denied. Please click to verify access.");
                    updateFolderUI(dirHandle ? 'SAVED_READY' : 'DEFAULT');
                }
            } catch (error) {
                console.error(error);
                if (error.name !== 'AbortError') { alert("Folder access failed. Try selecting it again."); }
                updateFolderUI('DEFAULT');
            } finally {
                isFolderLoading = false; 
            }
        }

      window.addEventListener('DOMContentLoaded', async () => {
    await loadAllRules(); // Rules pehle load honge
    const savedHandle = await getSavedFolderHandle();
    if (savedHandle) { updateFolderUI('SAVED_READY'); } 
    else { updateFolderUI('DEFAULT'); }
});

        // --- STATE SAVER ---
        function saveToPersistent(index, isImageAction = false) {
            const item = finalData[index];
            if(!item) return;
            if(!persistentState[item.groupKey]) persistentState[item.groupKey] = {};
            
            persistentState[item.groupKey].isDeleted = item.isDeleted;
            persistentState[item.groupKey].customDesign = item.design;
            persistentState[item.groupKey].customSize = item.size;
            persistentState[item.groupKey].customFinish = item.finish;
            persistentState[item.groupKey].customBody = item.body;
            
            if (isImageAction) {
                persistentState[item.groupKey].matchedFile = item.matchedFile;
                persistentState[item.groupKey].blobUrl = item.blobUrl;
                persistentState[item.groupKey].hasManualImageChange = true;
            }
        }

        // --- 3. PARSING & SMART GROUPING ---
        function processExcelData() {
            if (rawSheetData.length === 0) return;
            statusMsg.innerText = "Parsing & Grouping Data...";
            finalData = [];

            selectedSizes.clear();
            selectedFinishes.clear();
            selectedBodies.clear();

            if (!isAdvanceMode) {
                let col = { size: -1, design: -1, category: -1, body: -1, qtyGrade: -1 };
                for(let i=0; i<Math.min(rawSheetData.length, 20); i++) {
                    const row = rawSheetData[i].map(x => String(x).toLowerCase().trim());
                    if(row.includes('designname')) {
                        col.size = row.indexOf('size mm'); col.design = row.indexOf('designname');
                        col.category = row.indexOf('category'); col.body = row.indexOf('bodytype');
                        col.qtyGrade = row.indexOf(activeGrade.toLowerCase()); break;
                    }
                }

                if(col.design === -1) { alert("Basic Mode: Couldn't find headers (DesignName, Size MM). Check Excel."); return; }

                let groupedMap = {};
                for(let i=0; i<rawSheetData.length; i++) {
                    const row = rawSheetData[i];
                    if(!row || !row[col.design]) continue;
                    let dName = String(row[col.design]).trim();
                    if(dName.toLowerCase() === 'designname') continue; 

                    let size = col.size > -1 ? String(row[col.size]).trim() : "";
                    let finish = col.category > -1 ? String(row[col.category]).trim() : "";
                    let body = col.body > -1 ? String(row[col.body]).trim() : "";
                    
                    let cleanDesign = dName.toLowerCase().replace(/[^a-z0-9]/g, '');
                    let cleanSize = size.toLowerCase().replace(/[^a-z0-9]/g, '');
                    let cleanFinish = finish.toLowerCase().replace(/[^a-z0-9]/g, '');
                    let cleanBody = body.toLowerCase().replace(/[^a-z0-9]/g, '');

                    let groupKey = `${cleanDesign}_${cleanSize}_${cleanFinish}_${cleanBody}`;

                    if (!groupedMap[groupKey]) {
                        groupedMap[groupKey] = {
                            design: dName, cleanDesign: cleanDesign, size: size, cleanSize: cleanSize,
                            finish: finish, body: body, totalQty: 0, matchedFile: null, blobUrl: null, isDeleted: false,
                            groupKey: groupKey
                        };
                        let ps = persistentState[groupKey];
                        if (ps) {
                            groupedMap[groupKey].isDeleted = ps.isDeleted;
                            if (ps.customDesign) groupedMap[groupKey].design = ps.customDesign;
                            if (ps.customSize) groupedMap[groupKey].size = ps.customSize;
                            if (ps.customFinish) groupedMap[groupKey].finish = ps.customFinish;
                            if (ps.customBody) groupedMap[groupKey].body = ps.customBody;
                        }
                    }

                    let rawQty = col.qtyGrade > -1 ? row[col.qtyGrade] : 0;
                    let numQty = parseFloat(rawQty) || 0;
                    if (numQty > 0) groupedMap[groupKey].totalQty += numQty;
                }
                finalData = Object.values(groupedMap).filter(item => item.totalQty > 0); 
            } else {
                let col = { size: -1, design: -1, category: -1, body: -1, boxPack: -1, batch: -1, qtyGrade: -1 };
                for(let i=0; i<Math.min(rawSheetData.length, 20); i++) {
                    const row = rawSheetData[i].map(x => String(x).toLowerCase().trim());
                    if(row.includes('designname')) {
                        col.size = row.indexOf('size mm'); col.design = row.indexOf('designname');
                        col.category = row.indexOf('category'); col.body = row.indexOf('bodytype');
                        col.boxPack = row.indexOf('boxpack'); col.batch = row.indexOf('batch/shade');
                        col.qtyGrade = row.indexOf(activeGrade.toLowerCase()); break;
                    }
                }

                if(col.design === -1) { alert("Advance Mode: Couldn't find headers. Check Excel."); return; }

                let groupedMap = {};
                for(let i=0; i<rawSheetData.length; i++) {
                    const row = rawSheetData[i];
                    if(!row || !row[col.design]) continue;
                    let dName = String(row[col.design]).trim();
                    if(dName.toLowerCase() === 'designname') continue; 

                    let size = col.size > -1 ? String(row[col.size]).trim() : "";
                    let finish = col.category > -1 ? String(row[col.category]).trim() : "";
                    let body = col.body > -1 ? String(row[col.body]).trim() : "";
                    
                    let cleanDesign = dName.toLowerCase().replace(/[^a-z0-9]/g, '');
                    let cleanSize = size.toLowerCase().replace(/[^a-z0-9]/g, '');
                    let cleanFinish = finish.toLowerCase().replace(/[^a-z0-9]/g, '');
                    let cleanBody = body.toLowerCase().replace(/[^a-z0-9]/g, '');

                    let groupKey = `${cleanDesign}_${cleanSize}_${cleanFinish}_${cleanBody}`;

                    if (!groupedMap[groupKey]) {
                        groupedMap[groupKey] = {
                            design: dName, cleanDesign: cleanDesign, size: size, cleanSize: cleanSize,
                            finish: finish, body: body, totalQty: 0, batches: [], matchedFile: null, blobUrl: null, isDeleted: false,
                            groupKey: groupKey
                        };
                        let ps = persistentState[groupKey];
                        if (ps) {
                            groupedMap[groupKey].isDeleted = ps.isDeleted;
                            if (ps.customDesign) groupedMap[groupKey].design = ps.customDesign;
                            if (ps.customSize) groupedMap[groupKey].size = ps.customSize;
                            if (ps.customFinish) groupedMap[groupKey].finish = ps.customFinish;
                            if (ps.customBody) groupedMap[groupKey].body = ps.customBody;
                        }
                    }

                    let rawQty = col.qtyGrade > -1 ? row[col.qtyGrade] : 0;
                    let numQty = parseFloat(rawQty) || 0;
                    
                    if (numQty > 0) {
                        let bPack = col.boxPack > -1 ? String(row[col.boxPack]).trim() : "-";
                        let bBatch = col.batch > -1 ? String(row[col.batch]).trim() : "-";
                        let batchIdentifier = `${bPack}_${bBatch}`;

                        let existingBatch = groupedMap[groupKey].batches.find(b => b.id === batchIdentifier);
                        if (existingBatch) { existingBatch.qty += numQty; } 
                        else { groupedMap[groupKey].batches.push({ id: batchIdentifier, boxPack: bPack, batchNo: bBatch, qty: numQty }); }
                        groupedMap[groupKey].totalQty += numQty;
                    }
                }
                finalData = Object.values(groupedMap).filter(item => item.totalQty > 0); 
            }

            const customSurfaceOrder = [
                "ELEGANCE", "POLISH", "GLOSSY", "MATT", "RE MATT", "REPOSE",
                "RUSTIC MATT", "REMATT", "CARVE TECH", "LUMINOUS", "HIGH GLOSSY",
                "LUMINUS", "SOFT SATIN", "GRACE", "D.G MATT", "SAHARA", "SILK",
                "ROCKER", "ILLUSION", "GRAVEL", "SHAPE TECH", "RETROIS", "METALLIC",
                "GAMMA", "CRYSTAL", "BRILLIANT", "BRILLIANT CRYSTAL",
                "CRYSTALINE CRYSTAL", "LUX", "LUSTROUS", "REPOSE R-10", "ORRA"
            ];

            finalData.sort((a, b) => {
                // LEVEL 1: SIZE (A to Z)
                let sizeA = (a.size || "").toUpperCase().trim();
                let sizeB = (b.size || "").toUpperCase().trim();
                if (sizeA < sizeB) return -1;
                if (sizeA > sizeB) return 1;

                // LEVEL 2: SURFACE (Custom Order)
                let finishA = (a.finish || "").toUpperCase().trim();
                let finishB = (b.finish || "").toUpperCase().trim();
                let indexA = customSurfaceOrder.indexOf(finishA);
                let indexB = customSurfaceOrder.indexOf(finishB);

                if (indexA === -1) indexA = 9999;
                if (indexB === -1) indexB = 9999;

                if (indexA !== indexB) {
                    return indexA - indexB; 
                }
                
                if (indexA === 9999 && indexB === 9999 && finishA !== finishB) {
                    return finishA.localeCompare(finishB); 
                }

                // LEVEL 3: DESIGN NAME (A to Z)
                let designA = (a.design || "").toUpperCase().trim();
                let designB = (b.design || "").toUpperCase().trim();
                return designA.localeCompare(designB);
            });

            document.getElementById('excelText').innerText = `Data (${finalData.length})`;
            runMatcher();
        }

       function runMatcher() {
    if (finalData.length === 0) {
        mainContainer.innerHTML = '<div class="text-center text-[#FF3B30] font-bold text-sm mt-40">No data found.</div>';
        document.getElementById('foundItems').innerText = "0";
        generateBtn.disabled = true;
        return;
    }
    
    statusMsg.innerText = "Rules-based searching...";
    
    finalData.forEach((item) => {
        let ps = persistentState[item.groupKey];
        if (ps && ps.hasManualImageChange) {
            item.matchedFile = ps.matchedFile;
            item.blobUrl = ps.blobUrl;
            return; 
        }

        // 1. JSON se Expected Image Name dhundhna
        // Key format: designname|sizemm (Jaise rules file mein hai)
        let lookupKey = `${item.cleanDesign}|${item.cleanSize}`;
        let expectedFileName = masterRules[lookupKey]; 

        if (imageStore.length > 0) {
            let bestMatch = null;

            // 2. Step 5 Logic: Sirf wahi images filter karein jo sahi size folder mein hain
            // Aapka code pehle se cleanFolder track karta hai
            let folderImages = imageStore.filter(img => img.cleanFolder === item.cleanSize);

            if (expectedFileName) {
                // JSON Rule match hua: Exact file name search karein
                let cleanExpected = expectedFileName.toLowerCase().trim();
                bestMatch = folderImages.find(img => img.name.toLowerCase() === cleanExpected);
            }

            // Agar JSON rule nahi mila ya file nahi mili, toh fallback (purana method)
            if (!bestMatch) {
                bestMatch = folderImages.find(img => img.cleanName.includes(item.cleanDesign));
            }

            item.matchedFile = bestMatch ? bestMatch.file : null;
        }
    });
    renderGrid();
}

        // --- PRO FILTER RENDERING & LOGIC ---
        function renderFilters() {
            const sizeFiltersDiv = document.getElementById('sizeFilters');
            const finishFiltersDiv = document.getElementById('finishFilters');
            const bodyFiltersDiv = document.getElementById('bodyFilters');
            const resetBtn = document.getElementById('resetFiltersBtn');
            const advancedFiltersRow = document.getElementById('advancedFiltersRow');
            const svgIcon = `<svg class="pill-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`;

            let activeData = finalData.filter(item => !item.isDeleted);
            if (activeData.length === 0) { filterWrapper.classList.add('hidden'); filterWrapper.classList.remove('flex'); return; }

            let sizes = [...new Set(activeData.map(item => item.size))].filter(Boolean).sort();
            let finishes = [...new Set(activeData.map(item => item.finish))].filter(Boolean).sort();
            let bodies = [...new Set(activeData.map(item => item.body))].filter(Boolean).sort();

            if (sizes.length <= 1 && finishes.length <= 1 && bodies.length <= 1) { filterWrapper.classList.add('hidden'); filterWrapper.classList.remove('flex'); return; }

            filterWrapper.classList.remove('hidden'); filterWrapper.classList.add('flex');

            if (selectedSizes.size > 0 || selectedFinishes.size > 0 || selectedBodies.size > 0) { resetBtn.classList.remove('opacity-0', 'pointer-events-none'); } 
            else { resetBtn.classList.add('opacity-0', 'pointer-events-none'); }

            let sizeHtml = sizes.length > 0 ? `<button class="pro-pill ${selectedSizes.size === 0 ? 'active' : ''}" onclick="resetSizeFilters()">${svgIcon} ALL SIZES</button>` : '';
            sizes.forEach(s => { sizeHtml += `<button class="pro-pill ${selectedSizes.has(s) ? 'active' : ''}" onclick="toggleSizeFilter('${s}')">${svgIcon} ${s}</button>`; });
            sizeFiltersDiv.innerHTML = sizeHtml;

            let finishHtml = finishes.length > 0 ? `<button class="pro-pill ${selectedFinishes.size === 0 ? 'active' : ''}" onclick="resetFinishFilters()">${svgIcon} ALL SURFACES</button>` : '';
            finishes.forEach(f => { finishHtml += `<button class="pro-pill ${selectedFinishes.has(f) ? 'active' : ''}" onclick="toggleFinishFilter('${f}')">${svgIcon} ${f}</button>`; });
            finishFiltersDiv.innerHTML = finishHtml;

            if (bodies.length <= 1) {
                advancedFiltersRow.style.display = 'none'; bodyFiltersDiv.innerHTML = '';
            } else {
                advancedFiltersRow.style.display = 'flex';
                let bodyHtml = `<button class="pro-pill ${selectedBodies.size === 0 ? 'active' : ''}" onclick="resetBodyFilters()">${svgIcon} ALL BODIES</button>`;
                bodies.forEach(b => { bodyHtml += `<button class="pro-pill ${selectedBodies.has(b) ? 'active' : ''}" onclick="toggleBodyFilter('${b}')">${svgIcon} ${b}</button>`; });
                bodyFiltersDiv.innerHTML = bodyHtml;
            }
        }

        function resetAllFilters() { selectedSizes.clear(); selectedFinishes.clear(); selectedBodies.clear(); renderFilters(); applyVisibility(); }
        function resetSizeFilters() { selectedSizes.clear(); renderFilters(); applyVisibility(); }
        function resetFinishFilters() { selectedFinishes.clear(); renderFilters(); applyVisibility(); }
        function resetBodyFilters() { selectedBodies.clear(); renderFilters(); applyVisibility(); }

        function toggleSizeFilter(size) { selectedSizes.has(size) ? selectedSizes.delete(size) : selectedSizes.add(size); renderFilters(); applyVisibility(); }
        function toggleFinishFilter(finish) { selectedFinishes.has(finish) ? selectedFinishes.delete(finish) : selectedFinishes.add(finish); renderFilters(); applyVisibility(); }
        function toggleBodyFilter(body) { selectedBodies.has(body) ? selectedBodies.delete(body) : selectedBodies.add(body); renderFilters(); applyVisibility(); }

        function applyVisibility() {
            let visibleCount = 0; let missingCount = 0; 
            finalData.forEach((item, index) => {
                const wrapper = document.getElementById(`wrapper-${index}`);
                if (!wrapper) return;
                if (item.isDeleted) { wrapper.classList.add('hidden-item'); return; }
                if (!item.matchedFile) { missingCount++; }

                let showByMissing = isMissingFilterOn ? (wrapper.dataset.hasImage === "false") : true;
                let showBySize = selectedSizes.size === 0 || selectedSizes.has(item.size);
                let showByFinish = selectedFinishes.size === 0 || selectedFinishes.has(item.finish);
                let showByBody = selectedBodies.size === 0 || selectedBodies.has(item.body);

                if (showByMissing && showBySize && showByFinish && showByBody) { wrapper.classList.remove('hidden-item'); visibleCount++; } 
                else { wrapper.classList.add('hidden-item'); }
            });
            document.getElementById('foundItems').innerText = visibleCount;
            const missingTextEl = document.getElementById('missingCountText');
            if (missingTextEl) { missingTextEl.innerText = missingCount > 0 ? `(${missingCount})` : ''; }
            generateBtn.disabled = (visibleCount === 0);
        }

        // --- NEW FEATURES: INLINE EDIT, CARD DELETE, UNDO & IMAGE REMOVE ---
        function updateUndoButton() {
            const btn = document.getElementById('undoBtn');
            if (deletedStack.length > 0) {
                btn.classList.remove('opacity-0', 'pointer-events-none');
            } else {
                btn.classList.add('opacity-0', 'pointer-events-none');
            }
        }

        function undoLastDelete() {
            if (deletedStack.length === 0) return;
            const gKey = deletedStack.pop(); 
            
            const itemIndex = finalData.findIndex(item => item.groupKey === gKey);
            if (itemIndex !== -1) {
                finalData[itemIndex].isDeleted = false; 
                saveToPersistent(itemIndex);
            } else if (persistentState[gKey]) {
                persistentState[gKey].isDeleted = false; 
            }
            
            updateUndoButton();
            renderFilters(); applyVisibility();
        }

        function deleteCard(index) { 
            finalData[index].isDeleted = true; 
            saveToPersistent(index); 
            deletedStack.push(finalData[index].groupKey); 
            updateUndoButton();
            renderFilters(); applyVisibility(); 
        }

        function handleEdit(index, field, element) {
            let newValue = element.innerText.replace(/(\r\n|\n|\r)/gm, " ").trim();
            if(newValue === '') { element.innerText = finalData[index][field].toUpperCase(); return; }
            newValue = newValue.toUpperCase();
            if(finalData[index][field].toUpperCase() !== newValue) {
                finalData[index][field] = newValue;
                saveToPersistent(index); 
                if(field === 'size' || field === 'finish' || field === 'body') { renderFilters(); applyVisibility(); }
            }
        }

        function handlePaste(e) {
            e.preventDefault();
            let text = (e.originalEvent || e).clipboardData.getData('text/plain');
            text = text.replace(/(\r\n|\n|\r)/gm, " ").trim();
            document.execCommand('insertText', false, text);
        }

        // --- EXACT VISUAL CLONE OF PDF LAYOUT ---
        function renderGrid() {
            mainContainer.innerHTML = "";
            finalData.forEach((item, index) => {
                const wrapper = document.createElement('div');
                wrapper.className = "card-wrapper";
                wrapper.id = `wrapper-${index}`;

                wrapper.appendChild(innerContainer);
                mainContainer.appendChild(wrapper);

                            <span style="font-size:10px; margin-top:5px; font-family:'Inter', sans-serif;">CLICK OR DROP IMAGE</span>
                           </div>`;
                warningHtml = `<div class="warning-badge" id="warn-${index}">MISSING</div>`;
            }

            let deleteBtnHtml = `
                <button onclick="deleteCard(${index})" class="delete-btn absolute top-3 right-3 text-gray-400 hover:text-[#FF3B30] bg-white/80 p-1.5 rounded-full backdrop-blur-sm shadow-sm z-10" title="Delete Card">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                </button>

            let batchRowsHtml = "";
            if(item.batches && item.batches.length > 0) {
                item.batches.forEach(b => {
                    batchRowsHtml += `
                        <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; font-size:11px; margin-top:5px; color:#1C1C1E; font-weight:normal;">
                            <div style="text-align: left;">${b.boxPack}</div>
                            <div style="text-align: center;">${b.batchNo}</div>
                            <div style="text-align: center;">${b.qty}</div>
                        </div>
                    `;
                });
            }

            let commonLeftTop = `
                <div style="font-family:'Times New Roman', Times, serif; font-weight:bold; font-size:18px; color:#1C1C1E; letter-spacing:1.3px; text-transform:uppercase;">
                    <span class="editable-text" contenteditable="true" spellcheck="false" onblur="handleEdit(${index}, 'design', this)" onkeydown="if(event.key==='Enter'){this.blur(); event.preventDefault();}" onpaste="handlePaste(event)">${item.design}</span>
                </div>
                <div style="display:flex; align-items:center; margin-top:6px; font-size:10px; letter-spacing:0.5px;">
                    <span style="color:#6E6E73;">SIZE: <span class="editable-text" style="color:#1C1C1E;" contenteditable="true" spellcheck="false" onblur="handleEdit(${index}, 'size', this)" onkeydown="if(event.key==='Enter'){this.blur(); event.preventDefault();}" onpaste="handlePaste(event)">${item.size}</span></span>
                    
                    <span style="color:rgb(180, 180, 180); font-size:16px; position:relative; top:1px; margin:0 5px;">•</span>
                    
                    <span style="color:#6E6E73;">SURFACE: <span class="editable-text" style="color:#1C1C1E;" contenteditable="true" spellcheck="false" onblur="handleEdit(${index}, 'finish', this)" onkeydown="if(event.key==='Enter'){this.blur(); event.preventDefault();}" onpaste="handlePaste(event)">${item.finish}</span></span>
                    
                    <span style="color:rgb(180, 180, 180); font-size:16px; position:relative; top:1px; margin:0 5px;">•</span>
                    
                    <span style="color:#6E6E73;">BODY: <span class="editable-text" style="color:#1C1C1E;" contenteditable="true" spellcheck="false" onblur="handleEdit(${index}, 'body', this)" onkeydown="if(event.key==='Enter'){this.blur(); event.preventDefault();}" onpaste="handlePaste(event)">${item.body}</span></span>
                </div>
            `;

            let rightSide = `
                <div style="flex:0 0 21.4%; border-left:1px solid #E5E5E5; display:flex; flex-direction:column; align-items:center; justify-content:center;">
                    <div style="font-size:32px; font-weight:bold; color:#1C1C1E; line-height:1;">${item.totalQty}</div>
                    <div style="font-size:9px; font-weight:normal; color:#BE963C; letter-spacing:1.5px; margin-top:4px;">BOXES</div>
                </div>
            `;

            if (!isAdvanceMode) {
                return `
                    ${deleteBtnHtml}
                    ${warningHtml}
                    <div style="padding:12px 12px 0 12px;">
                        <div class="preview-img-container" id="imgBox-${index}" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event, ${index})">
                            ${imgHtml}
                        </div>
                    </div>
                    <div style="height:1px; background:#BE963C; margin:10px 20px;"></div>
                    <div style="display:flex; padding:0 0 16px 0; align-items:stretch; font-family:Helvetica, Arial, sans-serif;">
                        <div style="flex:1; padding:6px 20px;">
                            ${commonLeftTop}
                        </div>
                        ${rightSide}
                    </div>
                `;
            }

            return `
                ${deleteBtnHtml}
                ${warningHtml}
                <div style="padding:12px 12px 0 12px;">
                    <div class="preview-img-container" id="imgBox-${index}" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event, ${index})">
                        ${imgHtml}
                    </div>
                </div>
                <div style="height:1px; background:#BE963C; margin:10px 20px;"></div>
                <div style="display:flex; padding:0 0 16px 0; align-items:stretch; font-family:Helvetica, Arial, sans-serif;">
                    <div style="flex:1; padding:4px 20px;">
                        ${commonLeftTop}
                        <div style="margin-top:10px; padding-top:10px; border-top:1px dashed #E5E5E5;">
                            <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; font-size:10px; color:rgb(134, 134, 139); font-weight:bold; margin-bottom:2px;">
                                <div style="text-align: left;">BOX</div><div style="text-align: center;">BATCH NO</div><div style="text-align: center;">QTY</div>
                            </div>
                            ${batchRowsHtml}
                        </div>
                    </div>
                    ${rightSide}
                </div>
            `;
        }

        // --- UTILS ---
        function getDimensions(str) { const matches = str.match(/(\d+)/g); if (matches && matches.length >= 2) { const nums = matches.map(Number).sort((a,b) => b-a); return { w: nums[0], h: nums[1] }; } return null; }
        function sortFoldersByDistance(folderList, targetSizeStr) { const targetDims = getDimensions(targetSizeStr); if (!targetDims) return folderList; return folderList.sort((a, b) => { const dimsA = getDimensions(a); const dimsB = getDimensions(b); if (!dimsA) return 1; if (!dimsB) return -1; return (Math.abs(targetDims.w - dimsA.w) + Math.abs(targetDims.h - dimsA.h)) - (Math.abs(targetDims.w - dimsB.w) + Math.abs(targetDims.h - dimsB.h)); }); }

        function handleDragOver(e) { e.preventDefault(); e.currentTarget.classList.add('drag-active'); }
        function handleDragLeave(e) { e.currentTarget.classList.remove('drag-active'); }
        function handleDrop(e, index) { e.preventDefault(); e.currentTarget.classList.remove('drag-active'); if (e.dataTransfer.files && e.dataTransfer.files.length > 0) { const file = e.dataTransfer.files[0]; if(file.type.startsWith('image/')) updateSingleCard(index, file); } }
        function triggerImageUpload(index) { activeEditIndex = index; manualImgInput.click(); }
        manualImgInput.addEventListener('change', (e) => { if (activeEditIndex === -1 || e.target.files.length === 0) return; updateSingleCard(activeEditIndex, e.target.files[0]); manualImgInput.value = ''; });

        function updateSingleCard(index, file) {
            finalData[index].matchedFile = file; finalData[index].blobUrl = URL.createObjectURL(file);
            saveToPersistent(index, true); 
            
            const imgBox = document.getElementById(`imgBox-${index}`);
            const warnBadge = document.getElementById(`warn-${index}`);
            const wrapper = document.getElementById(`wrapper-${index}`);
            
            if(imgBox) imgBox.innerHTML = `<img src="${finalData[index].blobUrl}" class="preview-img" style="display: block; width: 100%; height: auto;"><div class="overlay flex gap-2"><button onclick="triggerImageUpload(${index})" class="bg-white/20 hover:bg-white/40 text-white px-3 py-1.5 rounded backdrop-blur-md transition-all text-[10px] font-bold tracking-wider">CHANGE</button><button onclick="removeImage(event, ${index})" class="bg-[#FF3B30]/80 hover:bg-[#FF3B30] text-white px-3 py-1.5 rounded backdrop-blur-md transition-all text-[10px] font-bold tracking-wider">REMOVE</button></div>`;
            if(warnBadge) warnBadge.style.display = 'none';
            if(wrapper) { 
                wrapper.dataset.hasImage = "true"; 
                if (!isMissingFilterOn) { 
                    applyVisibility(); 
                } else {
                    let missingCount = finalData.filter(item => !item.matchedFile && !item.isDeleted).length;
                    const missingTextEl = document.getElementById('missingCountText');
                    if (missingTextEl) { missingTextEl.innerText = missingCount > 0 ? `(${missingCount})` : ''; }
                }
            }
        }

        function readFileData(file) { return new Promise((resolve) => { const reader = new FileReader(); reader.onload = (e) => { const img = new Image(); img.onload = () => resolve({ data: e.target.result, ratio: img.width / img.height }); img.src = e.target.result; }; reader.readAsDataURL(file); }); }

        // --- PDF ENGINE ---
        async function createPDF() {
            const nameValue = pdfNameInput.value.trim();
            if (!nameValue) {
                pdfNameInput.classList.add('error'); pdfNameInput.focus();
                setTimeout(() => pdfNameInput.classList.remove('error'), 500); return; 
            }
            pdfNameInput.classList.remove('error');

            const pdfData = finalData.filter(item => {
                if (item.isDeleted) return false;
                let showByMissing = isMissingFilterOn ? (item.matchedFile !== null && item.matchedFile !== undefined) : true;
                let showBySize = selectedSizes.size === 0 || selectedSizes.has(item.size);
                let showByFinish = selectedFinishes.size === 0 || selectedFinishes.has(item.finish);
                let showByBody = selectedBodies.size === 0 || selectedBodies.has(item.body);
                return showByMissing && showBySize && showByFinish && showByBody;
            });

            if(pdfData.length === 0) { alert("No items match the current filters to export."); return; }
            
            const customSurfaceOrder = [
                "ELEGANCE", "POLISH", "GLOSSY", "MATT", "RE MATT", "REPOSE",
                "RUSTIC MATT", "REMATT", "CARVE TECH", "LUMINOUS", "HIGH GLOSSY",
                "LUMINUS", "SOFT SATIN", "GRACE", "D.G MATT", "SAHARA", "SILK",
                "ROCKER", "ILLUSION", "GRAVEL", "SHAPE TECH", "RETROIS", "METALLIC",
                "GAMMA", "CRYSTAL", "BRILLIANT", "BRILLIANT CRYSTAL",
                "CRYSTALINE CRYSTAL", "LUX", "LUSTROUS", "REPOSE R-10", "ORRA"
            ];

            pdfData.sort((a, b) => {
                // LEVEL 1: SIZE (A to Z)
                let sizeA = (a.size || "").toUpperCase().trim();
                let sizeB = (b.size || "").toUpperCase().trim();
                if (sizeA < sizeB) return -1;
                if (sizeA > sizeB) return 1;

                // LEVEL 2: SURFACE (Custom Order)
                let finishA = (a.finish || "").toUpperCase().trim();
                let finishB = (b.finish || "").toUpperCase().trim();
                let indexA = customSurfaceOrder.indexOf(finishA);
                let indexB = customSurfaceOrder.indexOf(finishB);

                if (indexA === -1) indexA = 9999;
                if (indexB === -1) indexB = 9999;

                if (indexA !== indexB) {
                    return indexA - indexB; 
                }
                
                if (indexA === 9999 && indexB === 9999 && finishA !== finishB) {
                    return finishA.localeCompare(finishB); 
                }

                // LEVEL 3: DESIGN NAME (A to Z)
                let designA = (a.design || "").toUpperCase().trim();
                let designB = (b.design || "").toUpperCase().trim();
                return designA.localeCompare(designB);
            });

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.deletePage(1); generateBtn.disabled = true; statusMsg.innerText = "Generating PDF...";
            const pageWidth = 210, imgMargin = 6, lineGap = 4, linePinpoint = 10;
            const cPearl = [253, 251, 247], cCharcoal = [28, 28, 30], cGold = [190, 150, 60], cGrey = [110, 110, 115];

            for (let i = 0; i < pdfData.length; i++) {
                const item = pdfData[i];
                let imgHeight = 100, fileObj = null; const displayWidth = pageWidth - (imgMargin * 2);
                if (item.matchedFile) { try { fileObj = await readFileData(item.matchedFile); imgHeight = displayWidth / fileObj.ratio; } catch(e) {} }

                let textBlockHeight = isAdvanceMode ? (28 + (item.batches.length * 6)) : 22;
                const totalPageHeight = imgMargin + imgHeight + lineGap + textBlockHeight;
                
                doc.addPage([pageWidth, totalPageHeight], (pageWidth > totalPageHeight) ? 'l' : 'p');
                doc.setFillColor(...cPearl); doc.rect(0, 0, pageWidth, totalPageHeight, 'F');
                
                if (fileObj) { doc.addImage(fileObj.data, 'JPEG', imgMargin, imgMargin, displayWidth, imgHeight, null, 'NONE'); }
                else { doc.setFillColor(240, 240, 240); doc.rect(imgMargin, imgMargin, displayWidth, imgHeight, 'F'); }
                
                const lineY = imgMargin + imgHeight + lineGap;
                doc.setDrawColor(...cGold); doc.setLineWidth(0.3); doc.line(linePinpoint, lineY, pageWidth - linePinpoint, lineY);
                
                let textY = lineY + 8; const contentMargin = 12;

                if (!isAdvanceMode) {
                    let separatorX = pageWidth - 45; let rightCenter = separatorX + (45 / 2);
                    doc.setFont("times", "bold"); doc.setFontSize(16); doc.setTextColor(...cCharcoal);
                    doc.text(String(item.design).toUpperCase(), contentMargin, textY + 2, { charSpace: 1.3 });

                    let row2Y = textY + 8; let cSpace = 0.5; doc.setFont("helvetica", "normal"); doc.setFontSize(8); 
                    
                    doc.setTextColor(...cGrey); doc.text(`SIZE: `, contentMargin, row2Y, { charSpace: cSpace });
                    let offsetX = contentMargin + doc.getTextWidth(`SIZE: `) + (5 * cSpace);
                    doc.setTextColor(...cCharcoal); doc.text(`${item.size}`.toUpperCase(), offsetX, row2Y, { charSpace: cSpace });
                    
                    offsetX += doc.getTextWidth(`${item.size}`.toUpperCase()) + (String(item.size).length * cSpace) + 12;
                    doc.setFontSize(16); doc.setTextColor(180, 180, 180); doc.text("•", offsetX - 6.5, row2Y + 1); doc.setFontSize(8);
                    
                    doc.setTextColor(...cGrey); doc.text(`SURFACE: `, offsetX, row2Y, { charSpace: cSpace });
                    offsetX += doc.getTextWidth(`SURFACE: `) + (8 * cSpace);
                    doc.setTextColor(...cCharcoal); doc.text(`${item.finish}`.toUpperCase(), offsetX, row2Y, { charSpace: cSpace });

                    offsetX += doc.getTextWidth(`${item.finish}`.toUpperCase()) + (String(item.finish).length * cSpace) + 12;
                    doc.setFontSize(16); doc.setTextColor(180, 180, 180); doc.text("•", offsetX - 6.5, row2Y + 1); doc.setFontSize(8);
                    
                    doc.setTextColor(...cGrey); doc.text(`BODY: `, offsetX, row2Y, { charSpace: cSpace });
                    offsetX += doc.getTextWidth(`BODY: `) + (5 * cSpace);
                    doc.setTextColor(...cCharcoal); doc.text(`${item.body}`.toUpperCase(), offsetX, row2Y, { charSpace: cSpace });

                    doc.setDrawColor(229, 229, 229); doc.setLineWidth(0.3);
                    doc.line(separatorX, lineY + 4, separatorX, lineY + 18);

                    doc.setFont("helvetica", "bold"); doc.setTextColor(...cCharcoal); doc.setFontSize(28); 
                    doc.text(String(item.totalQty), rightCenter, lineY + 12, { align: "center" });
                    doc.setFont("helvetica", "normal"); doc.setFontSize(7); doc.setTextColor(...cGold);
                    let lblBox = "BOXES"; let spcBox = 1.5; let wBox = doc.getTextWidth(lblBox) + ((lblBox.length - 1) * spcBox);
                    doc.text(lblBox, rightCenter - (wBox / 2), lineY + 17, { charSpace: spcBox });
                } else {
                    let separatorX = pageWidth - 45; let rightCenter = separatorX + (45 / 2);
                    doc.setFont("times", "bold"); doc.setFontSize(16); doc.setTextColor(...cCharcoal);
                    doc.text(String(item.design).toUpperCase(), contentMargin, textY, { charSpace: 1.3 });

                    textY += 6; let cSpace = 0.5; doc.setFont("helvetica", "normal"); doc.setFontSize(8); 
                    
                    doc.setTextColor(...cGrey); doc.text(`SIZE: `, contentMargin, textY, { charSpace: cSpace });
                    let offsetX = contentMargin + doc.getTextWidth(`SIZE: `) + (5 * cSpace);
                    doc.setTextColor(...cCharcoal); doc.text(`${item.size}`.toUpperCase(), offsetX, textY, { charSpace: cSpace });
                    offsetX += doc.getTextWidth(`${item.size}`.toUpperCase()) + (String(item.size).length * cSpace) + 12;
                    doc.setFontSize(16); doc.setTextColor(180, 180, 180); doc.text("•", offsetX - 6.5, textY + 1); doc.setFontSize(8); 
                    
                    doc.setTextColor(...cGrey); doc.text(`SURFACE: `, offsetX, textY, { charSpace: cSpace });
                    offsetX += doc.getTextWidth(`SURFACE: `) + (8 * cSpace);
                    doc.setTextColor(...cCharcoal); doc.text(`${item.finish}`.toUpperCase(), offsetX, textY, { charSpace: cSpace });
                    offsetX += doc.getTextWidth(`${item.finish}`.toUpperCase()) + (String(item.finish).length * cSpace) + 12;
                    doc.setFontSize(16); doc.setTextColor(180, 180, 180); doc.text("•", offsetX - 6.5, textY + 1); doc.setFontSize(8); 
                    
                    doc.setTextColor(...cGrey); doc.text(`BODY: `, offsetX, textY, { charSpace: cSpace });
                    offsetX += doc.getTextWidth(`BODY: `) + (5 * cSpace);
                    doc.setTextColor(...cCharcoal); doc.text(`${item.body}`.toUpperCase(), offsetX, textY, { charSpace: cSpace });

                    textY += 4; let dashLineY = textY - 0.5;
                    doc.setDrawColor(229, 229, 229); doc.setLineWidth(0.3); doc.setLineDashPattern([1.5, 1.5], 0);
                    doc.line(contentMargin, dashLineY, separatorX - 5, dashLineY); doc.setLineDashPattern([], 0);

                    textY += 5; doc.setFont("helvetica", "bold"); doc.setFontSize(8); doc.setTextColor(134, 134, 139);
                    doc.text("BOX", contentMargin, textY); doc.text("BATCH NO", contentMargin + 50, textY, { align: "center" }); doc.text("QTY", contentMargin + 90, textY, { align: "center" });

                    doc.setFont("helvetica", "normal"); doc.setFontSize(9); doc.setTextColor(...cCharcoal);
                    let batchY = textY + 6;
                    item.batches.forEach(b => {
                        doc.text(String(b.boxPack).toUpperCase(), contentMargin, batchY);
                        doc.text(String(b.batchNo).toUpperCase(), contentMargin + 50, batchY, { align: "center" });
                        doc.text(String(b.qty), contentMargin + 90, batchY, { align: "center" }); batchY += 5;
                    });

                    doc.setDrawColor(229, 229, 229); doc.setLineWidth(0.3);
                    let sectionBottomY = Math.max(batchY - 2, lineY + 30);
                    doc.line(separatorX, lineY + 6, separatorX, sectionBottomY);
                    
                    let lineMidpoint = (lineY + 6 + sectionBottomY) / 2; let adjustedMidpoint = lineMidpoint - 1.52; 
                    doc.setFont("helvetica", "bold"); doc.setTextColor(...cCharcoal); doc.setFontSize(28); 
                    doc.text(String(item.totalQty), rightCenter, adjustedMidpoint + 1, { align: "center" });
                    doc.setFont("helvetica", "normal"); doc.setFontSize(7); doc.setTextColor(...cGold);
                    let lblBox = "BOXES"; let spcBox = 1.5; let wBox = doc.getTextWidth(lblBox) + ((lblBox.length - 1) * spcBox);
                    doc.text(lblBox, rightCenter - (wBox / 2), adjustedMidpoint + 6, { charSpace: spcBox });
                }
            }
            doc.save(`${nameValue}.pdf`); statusMsg.innerText = "Export Done!"; generateBtn.disabled = false;
        }
        // Ye line HTML ke <img> tag mein apne aap photo bhar degi
document.getElementById('mainLogo').src = LOGO_BASE64;
    </script>
</body>
</html>
